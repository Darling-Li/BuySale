services:
  mysql:
    image: mysql:8.4
    container_name: rice-trade-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rice_trade
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - rice_trade_mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.4
    container_name: rice-trade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rice_trade_redis:/data
    command:
      - redis-server
      - --appendonly
      - "yes"

volumes:
  rice_trade_mysql:
  rice_trade_redis:
