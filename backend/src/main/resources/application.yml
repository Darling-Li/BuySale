server:
  port: 8848

spring:
  application:
    name: rice-trade
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/rice_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  ddos:
    enabled: ${APP_DDOS_ENABLED:false}
    path-prefixes: ${APP_DDOS_PATH_PREFIXES:/api/}
    client-ip-headers: ${APP_DDOS_CLIENT_IP_HEADERS:X-Forwarded-For,X-Real-IP}
    bloom-key: ${APP_DDOS_BLOOM_KEY:rice-trade:ddos:blocked-ip:bloom}
    counter-prefix: ${APP_DDOS_COUNTER_PREFIX:rice-trade:ddos:req:}
    bloom-size: ${APP_DDOS_BLOOM_SIZE:8388608}
    hash-count: ${APP_DDOS_HASH_COUNT:7}
    window-seconds: ${APP_DDOS_WINDOW_SECONDS:60}
    max-requests-per-window: ${APP_DDOS_MAX_REQUESTS_PER_WINDOW:300}
  token-session:
    enabled: ${APP_TOKEN_SESSION_ENABLED:true}
    key-prefix: ${APP_TOKEN_SESSION_KEY_PREFIX:rice-trade:auth:token:}
    ttl-seconds: ${APP_TOKEN_SESSION_TTL_SECONDS:1800}
    login-header: ${APP_TOKEN_SESSION_LOGIN_HEADER:X-Login-Request}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  access:
    enabled: ${APP_ACCESS_ENABLED:false}
    # Comma-separated examples for Alibaba Cloud deployment:
    # APP_ACCESS_ALLOWED_CIDRS=203.0.113.0/24,198.51.100.10
    # APP_ACCESS_ALLOWED_REGIONS=浙江省,上海市
    allowed-cidrs: ${APP_ACCESS_ALLOWED_CIDRS:}
    allowed-regions: ${APP_ACCESS_ALLOWED_REGIONS:}
    trusted-proxy-cidrs: ${APP_ACCESS_TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}
    region-headers: ${APP_ACCESS_REGION_HEADERS:X-Client-Region,X-Client-Province,X-Ali-Region}
  admin-device:
    enabled: ${APP_ADMIN_DEVICE_ENABLED:false}
    header-name: ${APP_ADMIN_DEVICE_HEADER:X-Admin-Device-Token}
    allowed-token-hashes: ${APP_ADMIN_DEVICE_TOKEN_HASHES:}
  crypto:
    enabled: ${APP_CRYPTO_ENABLED:true}
    shared-key: ${APP_CRYPTO_SHARED_KEY:lmbcddzxj1314}
    require-encrypted-requests: ${APP_CRYPTO_REQUIRE_ENCRYPTED_REQUESTS:true}
