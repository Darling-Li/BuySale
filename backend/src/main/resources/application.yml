server:
  port: 8848

spring:
  application:
    name: rice-trade
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/rice_trade?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  access:
    enabled: ${APP_ACCESS_ENABLED:false}
    # Comma-separated examples for Alibaba Cloud deployment:
    # APP_ACCESS_ALLOWED_CIDRS=203.0.113.0/24,198.51.100.10
    # APP_ACCESS_ALLOWED_REGIONS=浙江省,上海市
    allowed-cidrs: ${APP_ACCESS_ALLOWED_CIDRS:}
    allowed-regions: ${APP_ACCESS_ALLOWED_REGIONS:}
    trusted-proxy-cidrs: ${APP_ACCESS_TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}
    region-headers: ${APP_ACCESS_REGION_HEADERS:X-Client-Region,X-Client-Province,X-Ali-Region}
  crypto:
    enabled: ${APP_CRYPTO_ENABLED:true}
    shared-key: ${APP_CRYPTO_SHARED_KEY:lmbcddzxj1314}
    require-encrypted-requests: ${APP_CRYPTO_REQUIRE_ENCRYPTED_REQUESTS:true}
